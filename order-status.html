<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Status - AMA & CO TEXTILE</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
  <header>
    <div class="header-container">
      <div class="logo">
        <img src="logo.jpg" alt="AMA & CO TEXTILE">
      </div>
      <div class="notification-bell" id="notification-bell">
        <i class="fas fa-bell"></i>
        <span class="notification-badge" id="notification-badge">0</span>
        <div class="notification-dropdown" id="notification-dropdown"></div>
      </div>
      <div class="menu-toggle" id="mobile-menu">
        <span></span><span></span><span></span>
      </div>
      <ul class="nav-menu" id="nav-menu">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="gallery.html">Gallery</a></li>
        <li><a href="order-status.html" class="active">Order Status</a></li>
      </ul>
    </div>
  </header>

  <main>
    <h2>Check Order Status</h2>
    <div class="form-group">
      <label>Enter your phone number</label>
      <input type="tel" id="status-phone" placeholder="e.g. 08167726037">
      <button onclick="checkStatus()" class="btn">Check</button>
    </div>
    <div id="status-results"></div>

    <script>
      function checkStatus() {
        const phone = document.getElementById('status-phone').value;
        const orders = loadOrders().filter(o => o.phone === phone);
        const results = document.getElementById('status-results');
        results.innerHTML = '';
        if (orders.length === 0) {
          results.innerHTML = '<p>No orders found with that phone number.</p>';
          return;
        }
        orders.forEach(o => {
          results.innerHTML += `
            <div class="order-card">
              <p><strong>Order ID:</strong> ${o.orderId}</p>
              <p><strong>Product:</strong> ${o.productName}</p>
              <p><strong>Date:</strong> ${new Date(o.date).toLocaleDateString()}</p>
              <p><strong>Status:</strong> <span class="status-badge ${o.status === 'Delivered' ? 'delivered' : (o.status === 'On Delivery 🚚' ? 'ondelivery' : '')}">${o.status}</span></p>
            </div>
          `;
        });
      }
    </script>
  </main>

  <footer>
    <p>&copy; 2025 AMA & CO TEXTILE LTD. All rights reserved.</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
  <script src="data.js"></script>
  <script src="main.js"></script>
</body>
</html>
